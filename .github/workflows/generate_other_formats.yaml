name: generating other formats

on:
  push:
    branches:
      - GA_converter_tmp
  pull_request:


jobs:
  test:
    runs-on: ubuntu-latest
#    strategy:
#      matrix:
#        python-version: "3.9"

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install the required python packages
        run: python -m pip install .[test]

      - name: Other installations
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget curl

      - name: Generate other model representations
        continue-on-error: true
        run: |
          cd linkml-schema
          for file in *.yaml; 
            do name=`basename ${file} .yaml`;  
            gen-json-schema  ${file} > ../json-schema-autogen/${name}.json;
            gen-pydantic ${file} > ../models_py/autogen/${name}.py;
            gen-shacl ${file} > ../shacl-autogen/${name}.shacl.ttl;
            gen-erdiagram ${file} > ../erdiagram-autogen/${name}.mmd;
          done
          cd ..
      - name: test npm
        - uses: actions/checkout@v3
        - uses: actions/setup-node@v3
          with:
            node-version: 18
        - run: npm ci
        - run: npm test
      - name: Adding other model representations to git
        run: |  
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add json-schema-autogen/*.json
          git add models_py/autogen/*.py
          git add shacl-autogen/*.shacl.ttl
          git add erdiagram-autogen/*.mmd
          git commit -m "generate another formats"
          git push