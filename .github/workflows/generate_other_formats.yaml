      - name: Create local docs
        run: |
          mkdir docs
          touch docs/.nojekyll
          cp -r src/docs/* docs/
          gen-doc -d docs linkml-schema/ccn2.yaml
          mkdocs gh-deploy

      - name: Adding doc
        continue-on-error: true
        run: |  
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/*
          git commit -m "generate doc"
          git push
